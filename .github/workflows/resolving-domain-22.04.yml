# This is a basic workflow to help you get started with Actions

name: Create ipset.conf

# Controls when the action will run. Triggers the workflow on push or pull request
on:
  workflow_dispatch:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '00 20 * * *'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # The "build" workflow
  Creating_list:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - uses: actions/checkout@v4

    - name: Install dependencies for start script
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
       sudo apt update
       sudo apt install -y bind9-dnsutils git bash coreutils util-linux ccache dos2unix sudo language-pack-ru language-pack-en locales --no-install-suggests
       sudo sed -i -e 's/# en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen && \
       sudo sed -i -e 's/# ru_RU.UTF-8 UTF-8/ru_RU.UTF-8 UTF-8/' /etc/locale.gen
       sudo locale-gen --no-purge en_US.UTF-8 ru_RU.UTF-8
       sudo apt install -y ipset ipset-persistent iptables iptables-persistent wget curl grepcidr python3-netaddr python-is-python3 parallel --no-install-suggests

    - shell: bash
      env:
        TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        URL: ${{ secrets.URL_PRIVATE }}
        WORKFLOW: yes
      run: |
        curl --max-time 120 --retry-delay 3 --retry 10 -4 -H "Authorization: token ${TOKEN}" -# ${URL} > /tmp/ipdeny-update.sh

    - name: Pre-start and start bash script
      run: |
        chmod -c 755 /tmp/ipdeny-update.sh && sudo /tmp/ipdeny-update.sh && \
        mv -v /etc/iptables/ipsets ./ipset.conf

    - name: Commit files
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
          set -euo pipefail

          git remote add github "https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull github ${GITHUB_REF} --ff-only

          # Get name & email from last commit
          git config --local user.email "$(git log --format='%ae' --reverse | tail -1)"
          git config --local user.name "$(git log --format='%an' --reverse | tail -1)"

          # try commit
          #ipset.conf
          if [ -s ./ipset.conf ]; then
          echo -e "\e[1;33mNo empty ipset.conf...\033[0m"
          git add ipset.conf
          if [ -z "$(git status --porcelain)" ]; then
            echo -e "\e[1;33mNo changes ipset.conf...\033[0m"
            else
            git commit -m "Auto-update ipset.conf"
            # push changes
            git push github HEAD:${GITHUB_REF}
          fi
          else
          echo -e "\e[1;33mipset.conf EMPTY!!!!\033[0m"
          fi
